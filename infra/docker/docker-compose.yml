version: '3.8'

services:
  agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.agent
    env_file: ../../.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  scanner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.scanner
    env_file: ../../.env
    restart: unless-stopped
    depends_on:
      - agent

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../:/app
    command: node apps/api/src/index.js
    ports:
      - "4000:4000"
    env_file: ../../.env
    restart: unless-stopped
